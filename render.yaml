services:
  - type: web
    name: dietplanner-backend
    env: python
    rootDirectory: backend
    plan: free

    buildCommand: bash build.sh

    startCommand: >-
      python manage.py migrate --noinput &&
      gunicorn config.wsgi:application
      --bind 0.0.0.0:$PORT
      --workers 2
      --timeout 120
      --access-logfile -
      --error-logfile -

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.15
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "False"
      # Set these as secrets in the Render dashboard:
      # SECRET_KEY, DB_NAME, DB_USER (postgres.your-project-ref), DB_PASSWORD,
      # DB_HOST, DB_PORT (5432 session pooler or direct), DB_PROJECT_REF,
      # DATABASE_URL (optional), ALLOWED_HOSTS, FRONTEND_URL

    healthCheckPath: /api/health/

    autoDeploy: true
