services:
  - type: web
    name: dietplanner-backend
    env: docker
    plan: free

    # Docker build (Render will build from Dockerfile in backend/)
    dockerfilePath: backend/Dockerfile

    # Start Command inside container
    startCommand: gunicorn backend.config.wsgi:application --bind 0.0.0.0:8000

    # Environment Variables (set in Render dashboard as secrets)
    # ENVIRONMENT=production
    # DEBUG=False

    # Public Routes
    routes:
      - path: /
        matchType: prefix

    healthCheckPath: /admin/

    autoDeploy: true
